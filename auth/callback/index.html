<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UniVerse E-posta Dogrulama</title>
  <style>
    :root {
      --ink: #0f172a;
      --muted: #64748b;
      --line: rgba(15, 23, 42, 0.1);
      --blue: #2563eb;
      --cyan: #06b6d4;
      --green: #16a34a;
      --paper: rgba(255, 255, 255, 0.82);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 20%, rgba(56, 189, 248, 0.28), transparent 32rem),
        radial-gradient(circle at 86% 12%, rgba(34, 197, 94, 0.20), transparent 28rem),
        linear-gradient(145deg, #f8fbff 0%, #eef7ff 48%, #f7fee7 100%);
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .orbit {
      position: fixed;
      width: 44rem;
      height: 44rem;
      border: 1px solid rgba(37, 99, 235, 0.12);
      border-radius: 999px;
      animation: drift 18s ease-in-out infinite alternate;
    }

    .orbit.one {
      left: -18rem;
      top: -18rem;
    }

    .orbit.two {
      right: -20rem;
      bottom: -20rem;
      animation-delay: -6s;
    }

    .card {
      position: relative;
      width: min(92vw, 440px);
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 32px;
      background: var(--paper);
      box-shadow: 0 24px 90px rgba(15, 23, 42, 0.16);
      backdrop-filter: blur(22px);
      text-align: center;
    }

    .badge {
      width: 92px;
      height: 92px;
      margin: 0 auto 20px;
      display: grid;
      place-items: center;
      border-radius: 28px;
      background: linear-gradient(135deg, var(--blue), var(--cyan));
      box-shadow: 0 18px 42px rgba(37, 99, 235, 0.32);
      color: white;
      font-size: 44px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 7vw, 38px);
      letter-spacing: -0.04em;
      line-height: 1.04;
    }

    p {
      margin: 12px auto 0;
      max-width: 34ch;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.65;
    }

    .status {
      margin-top: 18px;
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(22, 163, 74, 0.09);
      color: #166534;
      font-weight: 700;
      font-size: 14px;
    }

    .actions {
      display: grid;
      gap: 10px;
      margin-top: 22px;
    }

    a,
    button {
      width: 100%;
      min-height: 52px;
      border: 0;
      border-radius: 18px;
      display: inline-grid;
      place-items: center;
      cursor: pointer;
      font: inherit;
      font-weight: 800;
      text-decoration: none;
    }

    .primary {
      background: linear-gradient(135deg, var(--ink), #1e3a8a);
      color: white;
      box-shadow: 0 16px 34px rgba(15, 23, 42, 0.2);
    }

    .secondary {
      background: rgba(15, 23, 42, 0.06);
      color: #334155;
    }

    .hint {
      margin-top: 16px;
      color: #94a3b8;
      font-size: 12px;
    }

    @keyframes drift {
      from {
        transform: translate3d(0, 0, 0) rotate(0deg);
      }
      to {
        transform: translate3d(28px, -18px, 0) rotate(18deg);
      }
    }
  </style>
</head>
<body>
  <div class="orbit one"></div>
  <div class="orbit two"></div>
  <main class="card" data-target="auth/callback" data-flow="signup">
    <div class="badge" aria-hidden="true">✓</div>
    <h1>E-postan dogrulandi</h1>
    <p>UniVerse hesabini aktiflestirmek icin uygulamaya geri donuyoruz. Uygulama otomatik acilmazsa butona dokun.</p>
    <div class="status">Dogrulama tamamlandi, uygulama aciliyor...</div>
    <div class="actions">
      <button class="primary" id="open-app" type="button">Uygulamayi Ac</button>
      <a class="secondary" href="../../">UniVerse Ana Sayfa</a>
    </div>
    <div class="hint">Bu pencereyi kapatabilirsin; islem uygulamada tamamlanacak.</div>
  </main>
  <script>
    (function () {
      var scheme = "ogrencisosyalagi";
      var card = document.querySelector("[data-target]");
      var target = card.getAttribute("data-target") || "auth/callback";
      var flow = card.getAttribute("data-flow") || "signup";

      function mergeParams() {
        var params = new URLSearchParams(window.location.search);
        var hash = String(window.location.hash || "").replace(/^#/, "");
        if (hash) {
          var hashParams = new URLSearchParams(hash);
          hashParams.forEach(function (value, key) {
            if (!params.has(key)) params.set(key, value);
          });
        }
        if (!params.has("flow")) params.set("flow", flow);
        return params.toString();
      }

      function buildAppUrl() {
        var query = mergeParams();
        return scheme + "://" + target + (query ? "?" + query : "");
      }

      function openApp() {
        window.location.href = buildAppUrl();
      }

      document.getElementById("open-app").addEventListener("click", openApp);
      window.setTimeout(openApp, 650);
    })();
  </script>
</body>
</html>
